<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Language Maps</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; text-align: center; }
    iframe { width: 100%; height: 85vh; border: 1px solid #ccc; margin-top: 20px; }
    select { padding: 8px; font-size: 16px; }
    a { display: inline-block; margin-bottom: 15px; }
  </style>
</head>
<body>
  <a href="index.html">← Back to Home</a>
  <h1>Language Maps</h1>

  <label for="languageSelect">Choose a language:</label>
  <select id="languageSelect">
    <option value="">-- Select a language --</option>
    <option value="maps/spanish.html">Spanish</option>
    <option value="maps/haitian_creole.html">Haitian Creole</option>
    <option value="maps/vietnamese.html">Vietnamese</option>
  </select>

  <iframe id="mapFrame" src=""></iframe>

  <script>
    const select = document.getElementById("languageSelect");
    const frame = document.getElementById("mapFrame");

    select.addEventListener("change", function () {
      frame.src = this.value;
    });
  </script>
</body>
</html>
